<!DOCTYPE html>
<html lang="zh">

<head>
	<meta charset="utf-8" />
	<title>轻量级轮播图</title>
	<meta name="def-grey" content="false" />
	<meta http-equiv="X-UA-Compatible" content="edge" />
	<link rel="short icon" href="img/logo.ico" />
	<link rel="stylesheet" type="text/css" href="css/simple_style.css" />
	<script type="text/javascript" src="js/simple_swiper.js"></script>
</head>

<body>
	<div class="app">
		<div class="heiwukong simple-swiper-container" style="border: none;">
			<span id="prev2" class="btn btn-prev">
				
			</span>
			<span id="next2" class="btn btn-next">
				
			</span>
			<div class="swiper-wrapper">
				<div class="swiper-items">
					<span class="swiper-text">默认显示文本</span>
				</div>
				<div class="swiper-items">
					<span class="swiper-text">默认显示文本一</span>
				</div>
			</div>
			<div class="pagehelper pagination"></div>
		</div>
	</div>
	</div>
	<style>
		body {
			background-color: rgb(58, 58, 58);
			margin: 0;
			padding: 0px;
			box-sizing: border-box;
			height: auto;
			position: relative;
			overflow-y: auto;
			border-radius: 8px;
		}

		.heiwukong {
			height: 120px;
			border: 1px solid #8f8f8f;
			width: 540px;
			background-color: white;
			margin: 45vh auto;
			margin-bottom: 0;
			position: relative;
			border-radius: 6px;
		}

		.swiper-text{
			height: 100%;
			display: flex;
			justify-content: center;
			align-items: center;
			font-size: 36px;
		}
		.swiper-items {
			text-align: center;
			height: 100%;
			position: relative;
			overflow: hidden;
			background-color: #8f8f8f;
		}

		.swiper-items img {
			width: auto;
			height: 100%;
		}

		.heiwukong .pagehelper {
			text-align: right;
		}

		.pagehelper .pagination-items {
			width: 60px;
			height: 6px;
			border-radius: 0;
			border: none;

			transition: width .3s;
		}

		.heiwukong .pagehelper .pagination-items-active {
			width: 80px;
			background-color: none;
		}
	</style>
	<script type="text/javascript">
		new SimSwiper(".heiwukong", {
			button: {
				prev: "#prev2", // 前进后退按钮
				next: "#next2"
			},
			loop: true,
			duration: 300,
			disabvarouch: !1, // 是否关闭触摸
			autoplay: false,
			gap:10, //间隔 number or string
			accelerate: true,
			direction: 'horizontal',//horizontal
			pagination: {
				el: ".pagination",
				click: true
			},
		});
	</script>
</body>

</html>
