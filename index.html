<!DOCTYPE html>
<html lang="zh">

<head>
	<meta charset="utf-8" />
	<title>插件</title>
	<meta name="def-grey" content="false" />
	<meta http-equiv="X-UA-Compatible" content="edge" />
	<link rel="short icon" href="img/logo.ico" />
	<link rel="stylesheet" type="text/css" href="css/simple_style.css" />
	<link rel="stylesheet" type="text/css" href="css/style.css" />
	<script type="text/javascript" src="js/simple_swiper_dev.js"></script>
</head>


<body>
	<div class="app">
		<div class="heiwukong simple-swiper-container">
			<div class="swiper-wrapper">
				<div class="swiper-items">
					<a href="#213123123">
						<img src="https://r534.com/flysheep/i/%E8%94%91%E8%A7%86/16a6d.jpg" alt="">
					</a>
				</div>
				<div class="swiper-items">
					<a href="#2132132132131">
						<img src="https://s2.loli.net/2025/07/15/azXKmFeulUW1HSb.jpg" alt="">
					</a>
				</div>
				<div class="swiper-items">
					<img src="https://q5.itc.cn/q_70/images03/20240608/cfda5b7bb70343fa977aef64f569babb.jpeg" alt="">
				</div>
				<div class="swiper-items">
					<img src="https://media.st.dl.eccdnx.com/steam/apps/1286680/extras/DFDL_CG_616x353_MC_QA.jpg"
						alt="">
				</div>
				<div class="swiper-items">
					<img src="https://r534.com/flysheep/i/%E8%94%91%E8%A7%86/16a6d.jpg" alt="">
				</div>
				<div class="swiper-items">
					<img src="https://img1.baidu.com/it/u=1768258390,2309846664&fm=253&fmt=auto&app=120&f=JPEG?w=800&h=500"
						alt="">
				</div>
			</div>
			<div class="pagehelper pagination" id="pagination"></div>
			<span id="prev" class="btn btn-prev">
			</span>
			<span id="next" class="btn btn-next"> </span>
		</div>
	</div>
	</div>

	<script type="text/javascript">
		window.onload = function () {
			document.documentElement.style.height = this.innerHeight + "px";
			this.addEventListener("resize", () => {
				document.documentElement.style.height = this.innerHeight + "px";
			})
			new SimSwiper(".heiwukong", {
				navigator: {
					prev: "#prev",// 前进后退按钮
					next: "#next",
					key: true
				},
				pagination: "#pagination",
				autoplay: false,
				loop: true,
				gab: 2,
				// direction: "v",
				// duration: 800,
				defaultIndex: 2,
				disabvarouch: false, // 关闭触摸
				lazy: {
					enable: true,
					prop: "data"
				},
				on: {
					change(e, e1) {
						// console.log(this);
					},
					transition: function (e) {
						console.log(e);
						// document.body.style.transform = `translateX(${e}px)`;
					}
				}
			});
		}</script>
</body>

</html>
