<!DOCTYPE html>
<html lang="zh">

<head>
	<meta charset="utf-8" />
	<title>插件</title>
	<meta name="def-grey" content="false" />
	<meta http-equiv="X-UA-Compatible" content="edge" />
	<link rel="short icon" href="img/logo.ico" />
	<link rel="stylesheet" type="text/css" href="css/simple_style.css" />
	<link rel="stylesheet" type="text/css" href="css/style.css" />
	<script type="text/javascript" src="js/simple_swiper_dev.js"></script>
</head>


<body>
	<div class="app">
		<div class="heiwukong simple-swiper-container">
			<div class="swiper-wrapper">
				<div class="swiper-items">
					<a href="#213123123">
						<img src="https://storage.360buyimg.com/component-libray/images/pc/pc_banner_snacks.png" alt="">
					</a>
				</div>
				<div class="swiper-items">
					<a href="#2132132132131">
						<img src="https://storage.360buyimg.com/component-libray/images/pc/pc_banner_home_appliances.png"
							alt="">
					</a>
				</div>
				<div class="swiper-items">
					<img src="https://storage.360buyimg.com/component-libray/images/pc/pc_banner_cell_phone.png" alt="">
				</div>
				<div class="swiper-items">
					<img src="https://storage.360buyimg.com/component-libray/images/pc/pc_banner_digital_equipment.png"
						alt="">
				</div>
				<div class="swiper-items">
					<img src="https://storage.360buyimg.com/component-libray/images/pc/pc_banner_home_decoration.png"
						alt="">
				</div>
				<div class="swiper-items">
					<img src="https://storage.360buyimg.com/component-libray/images/pc/pc_banner_snacks.png" alt="">
				</div>
			</div>
			<div class="pagehelper pagination" id="pagination"></div>
			<span id="prev" class="btn btn-prev">
			</span>
			<span id="next" class="btn btn-next"> </span>
		</div>
	</div>
	</div>

	<script type="text/javascript">
		window.onload = function () {
			document.documentElement.style.height = this.innerHeight + "px";
			this.addEventListener("resize", () => {
				document.documentElement.style.height = this.innerHeight + "px";
			})
		}
		var $ = new SimSwiper(".heiwukong", {
			navigator: {
				prev: "#prev",// 前进后退按钮
				next: "#next"
			},
			pagination: {
				click: true,
				el: ".pagehelper"
			}, autoplay: true,
			loop: true,
			defaultIndex: 2,
			disabvarouch: false, // 关闭触摸
			lazy: {
				enable: true,
				prop: "data"
			}
		}).$;
	</script>
</body>

</html>
