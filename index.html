<!DOCTYPE html>
<html lang="zh">

<head>
	<meta charset="utf-8" />
	<title>轻量级轮播图</title>
	<meta name="def-grey" content="false" />
	<meta http-equiv="X-UA-Compatible" content="edge" />
	<link rel="short icon" href="img/logo.ico" />
	<link rel="stylesheet" type="text/css" href="css/simple_style.css" />
	<script type="text/javascript" src="js/simple_swiper.js"></script>
</head>

<body>
	<div class="app">
		<div class="swiper-taobao simple-swiper-container" style="border: none;">
			<span id="prev2" class="btn btn-prev"></span>
			<span id="next2" class="btn btn-next"></span>
			<div class="swiper-wrapper">
				<div class="swiper-items">
					<div class="ikun_img_wrapper">
					</div>
				</div>
				<div class="swiper-items">
					<div class="ikun_img_wrapper">
					</div>
				</div>
				<div class="swiper-items">
					<div class="ikun_img_wrapper">
					</div>
				</div>
			</div>
			<div class="pagehelper pagination"></div>
		</div>
	</div>
	</div>
	<style>
		code {
			font-size: 18px;
		}

		body {
			/* background-color: white; */
			margin: 0;
			padding: 0px;
			box-sizing: border-box;
			height: auto;
			position: relative;
			overflow-y: auto;
			border-radius: 8px;
		}
		.ikun_img_wrapper{
			display: flex;
			border:1px solid white;
			background-color: #2e2e2e;
			flex-direction: row;
			flex-wrap: wrap;
			box-sizing: border-box;
			height: 100%;
			justify-content: space-between;
		}
		.ikun_img_wrapper::after{
			content: '';
			display: block;
			width: 32%;
		}
		.ikun_img_wrapper img{
			height: 150px;
			object-fit: contain;
		}
		.swiper-taobao {
			height: 840px;
			border:1px solid #8f8f8f;
			width: 640px;
			margin: 4vh auto;
			margin-bottom: 0;
			position: relative;
			border-radius: 6px;
		}


		.swiper-items {
			text-align: center;
			height: 100%;
		}
	</style>
	<script type="text/javascript">

		const wrapp = document.getElementsByClassName("ikun_img_wrapper");

		function render(){
			let i=1;
			while(i<=24){
				const img = document.createElement("img");
				img.setAttribute("data",'/img/'+i+'.png');
				if(i<=8){
					wrapp[0].appendChild(img);
				}else if(i>8&&i<=16){
					wrapp[1].appendChild(img);
				}else{
					wrapp[2].appendChild(img);
				}
				i++;
			}
		}
		render();
		new SimSwiper(".swiper-taobao", {
			loop:true,
			button: {
				prev: "#prev2", // 前进后退按钮
				next: "#next2"
			},
			disabvarouch: !1,
			autoplay: false,
			lazy: {
				enable: true,
				prop: "data"
			},
			accelerate: true,
			direction: 'v',//horizontal
			pagination: {
				el: ".pagination",
				click: true
			},
		});
	</script>
</body>

</html>
