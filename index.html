<!DOCTYPE html>
<html lang="zh">

<head>
	<meta charset="utf-8" />
	<title>轻量级轮播图</title>
	<meta name="def-grey" content="false" />
	<meta http-equiv="X-UA-Compatible" content="edge" />
	<link rel="short icon" href="img/logo.ico" />
	<link rel="stylesheet" type="text/css" href="css/simple_style.css" />
	<script type="text/javascript" src="js/simple_swiper_min.js"></script>
</head>

<body>
	<div class="app">
		<div class="heiwukong simple-swiper-container" style="border: none;">
			<span id="prev2" class="btn btn-prev">
				<img src="/img/icon-last.png" alt="">
			</span>
			<span id="next2" class="btn btn-next">
				<img src="/img/icon-next.png" alt="">
			</span>
			<div class="swiper-wrapper">
				<div class="swiper-items">
					<a href="#213123123">
						<img data="img/swiper01.jpg" alt="">
					</a>
				</div>
				<div class="swiper-items">
					<a href="#2132132132131">
						<img data="img/swiper02.jpg" alt="">
					</a>
				</div>
				<div class="swiper-items">
					<img data="img/swiper03.jpg" alt="">
				</div>
				<div class="swiper-items">
					<img data="img/swiper04.jpg" alt="">
				</div>
				<div class="swiper-items">
					<img data="img/swiper05.jpg" alt="">
				</div>
			</div>
			<div class="pagehelper pagination"></div>
		</div>
	</div>
	</div>
	<style>
		.heiwukong .btn {
			height: 418px;
			width: 140px;
			top: 30%;
			background-image: none;
		}

		.btn>img {
			width: 100%;
			height: 100%;
		}

		body {
			background-color: rgb(58, 58, 58);
			margin: 0;
			padding: 0px;
			box-sizing: border-box;
			height: auto;
			position: relative;
			overflow-y: auto;
			border-radius: 8px;
		}

		.heiwukong {
			height: 863px;
			border: 1px solid #8f8f8f;
			width: 1538px;
			margin: 4vh auto;
			margin-bottom: 0;
			position: relative;
			border-radius: 6px;
		}


		.swiper-items {
			text-align: center;
			height: 100%;
			position: relative;
			overflow: hidden;
		}

		.swiper-items img {
			width: auto;
			height: 100%;
		}

		.heiwukong .pagehelper {
			text-align: right;
		}

		.pagehelper .pagination-items {
			width: 60px;
			height: 6px;
			border-radius: 0;
			border: none;

			transition: width .3s;
		}

		.heiwukong .pagehelper .pagination-items-active {
			width: 80px;
			background-color: none;
		}
	</style>
	<script type="text/javascript">
		new SimSwiper(".heiwukong", {
			button: {
				prev: "#prev2", // 前进后退按钮
				next: "#next2"
			},
			loop: true,
			easing: 'ease-in-out',
			duration: 1456,
			disabvarouch: !1,
			autoplay: false,
			lazy: {
				enable: true,
				prop: "data"
			},
			accelerate: true,
			direction: 'horizontal',//horizontal
			pagination: {
				el: ".pagination",
				click: true
			},
		});
	</script>
</body>

</html>
